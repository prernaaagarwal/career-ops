<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career-Ops — Control Panel</title>
<style>
  /* ---------- Fonts (self-hosted) ---------- */
  @font-face {
    font-family: 'Space Grotesk';
    src: url('/fonts/space-grotesk-latin.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215;
  }
  @font-face {
    font-family: 'Space Grotesk';
    src: url('/fonts/space-grotesk-latin-ext.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-024F, U+0259, U+1E00-1EFF, U+2020, U+20A0-20AB, U+20AD-20CF, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }
  @font-face {
    font-family: 'DM Sans';
    src: url('/fonts/dm-sans-latin.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215;
  }
  @font-face {
    font-family: 'DM Sans';
    src: url('/fonts/dm-sans-latin-ext.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-024F, U+0259, U+1E00-1EFF, U+2020, U+20A0-20AB, U+20AD-20CF, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }

  /* ---------- Reset ---------- */
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* ---------- Design tokens ---------- */
  :root {
    /* Backgrounds */
    --bg:        #0f1117;
    --bg2:       #181a24;
    --bg3:       #1e2030;
    --bg-hover:  #23263a;

    /* Borders + text */
    --border:    #2a2d3e;
    --border2:   #353850;
    --text:      #e0e0e8;
    --text2:     #9a9bb0;
    --text3:     #6b6d82;

    /* Accent colors */
    --cyan:      hsl(187, 74%, 42%);
    --cyan-dim:  hsl(187, 50%, 22%);
    --cyan-fg:   hsl(187, 90%, 70%);
    --purple:    hsl(270, 70%, 55%);
    --purple-dim:hsl(270, 40%, 25%);
    --purple-fg: hsl(270, 85%, 75%);
    --green:     hsl(150, 60%, 45%);
    --green-dim: hsl(150, 40%, 22%);
    --yellow:    hsl(45, 90%, 55%);
    --yellow-dim:hsl(45, 60%, 25%);
    --red:       hsl(0, 65%, 55%);
    --red-dim:   hsl(0, 45%, 25%);
    --orange:    hsl(25, 80%, 55%);

    /* Typography */
    --font-head: 'Space Grotesk', system-ui, -apple-system, sans-serif;
    --font-body: 'DM Sans', system-ui, -apple-system, sans-serif;
    --font-mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;

    /* Spacing + radius */
    --radius-sm: 6px;
    --radius:    10px;
    --radius-lg: 14px;
    --shadow:    0 4px 16px rgba(0, 0, 0, 0.3);
    --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);

    /* Transitions */
    --trans: 150ms ease;
  }

  /* ---------- Base body ---------- */
  html, body {
    height: 100%;
  }

  body {
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    background: var(--bg);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  h1, h2, h3, h4, h5, h6 {
    font-family: var(--font-head);
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  a {
    color: var(--cyan-fg);
    text-decoration: none;
    transition: color var(--trans);
  }
  a:hover { color: var(--cyan); }

  button {
    font-family: inherit;
    font-size: inherit;
    color: inherit;
    background: none;
    border: none;
    cursor: pointer;
  }

  input, select, textarea {
    font-family: inherit;
    font-size: inherit;
    color: inherit;
  }

  code, pre {
    font-family: var(--font-mono);
  }

  ::selection {
    background: var(--cyan-dim);
    color: var(--text);
  }

  /* ---------- Scrollbar ---------- */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb {
    background: var(--border2);
    border-radius: 5px;
    border: 2px solid var(--bg);
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>
  <!-- Step 2 will add header + tab navigation here -->
</body>
</html>
