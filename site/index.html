<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career-Ops — Control Panel</title>
<style>
  /* ---------- Fonts (self-hosted) ---------- */
  @font-face {
    font-family: 'Space Grotesk';
    src: url('/fonts/space-grotesk-latin.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215;
  }
  @font-face {
    font-family: 'Space Grotesk';
    src: url('/fonts/space-grotesk-latin-ext.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-024F, U+0259, U+1E00-1EFF, U+2020, U+20A0-20AB, U+20AD-20CF, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }
  @font-face {
    font-family: 'DM Sans';
    src: url('/fonts/dm-sans-latin.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215;
  }
  @font-face {
    font-family: 'DM Sans';
    src: url('/fonts/dm-sans-latin-ext.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-024F, U+0259, U+1E00-1EFF, U+2020, U+20A0-20AB, U+20AD-20CF, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }

  /* ---------- Reset ---------- */
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* ---------- Design tokens ---------- */
  :root {
    /* Backgrounds */
    --bg:        #0f1117;
    --bg2:       #181a24;
    --bg3:       #1e2030;
    --bg-hover:  #23263a;

    /* Borders + text */
    --border:    #2a2d3e;
    --border2:   #353850;
    --text:      #e0e0e8;
    --text2:     #9a9bb0;
    --text3:     #6b6d82;

    /* Accent colors */
    --cyan:      hsl(187, 74%, 42%);
    --cyan-dim:  hsl(187, 50%, 22%);
    --cyan-fg:   hsl(187, 90%, 70%);
    --purple:    hsl(270, 70%, 55%);
    --purple-dim:hsl(270, 40%, 25%);
    --purple-fg: hsl(270, 85%, 75%);
    --green:     hsl(150, 60%, 45%);
    --green-dim: hsl(150, 40%, 22%);
    --yellow:    hsl(45, 90%, 55%);
    --yellow-dim:hsl(45, 60%, 25%);
    --red:       hsl(0, 65%, 55%);
    --red-dim:   hsl(0, 45%, 25%);
    --orange:    hsl(25, 80%, 55%);

    /* Typography */
    --font-head: 'Space Grotesk', system-ui, -apple-system, sans-serif;
    --font-body: 'DM Sans', system-ui, -apple-system, sans-serif;
    --font-mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;

    /* Spacing + radius */
    --radius-sm: 6px;
    --radius:    10px;
    --radius-lg: 14px;
    --shadow:    0 4px 16px rgba(0, 0, 0, 0.3);
    --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);

    /* Transitions */
    --trans: 150ms ease;
  }

  /* ---------- Base body ---------- */
  html, body {
    height: 100%;
  }

  body {
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    background: var(--bg);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  h1, h2, h3, h4, h5, h6 {
    font-family: var(--font-head);
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  a {
    color: var(--cyan-fg);
    text-decoration: none;
    transition: color var(--trans);
  }
  a:hover { color: var(--cyan); }

  button {
    font-family: inherit;
    font-size: inherit;
    color: inherit;
    background: none;
    border: none;
    cursor: pointer;
  }

  input, select, textarea {
    font-family: inherit;
    font-size: inherit;
    color: inherit;
  }

  code, pre {
    font-family: var(--font-mono);
  }

  ::selection {
    background: var(--cyan-dim);
    color: var(--text);
  }

  /* ---------- Scrollbar ---------- */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb {
    background: var(--border2);
    border-radius: 5px;
    border: 2px solid var(--bg);
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* ---------- Header ---------- */
  .app-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15, 17, 23, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .app-header-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .brand-logo {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    display: grid;
    place-items: center;
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 15px;
    color: #0a0b10;
  }

  .brand-name {
    font-family: var(--font-head);
    font-weight: 600;
    font-size: 16px;
    letter-spacing: -0.01em;
  }
  .brand-name span { color: var(--text2); font-weight: 400; }

  /* ---------- Tab navigation ---------- */
  .tabs {
    display: flex;
    gap: 2px;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    position: relative;
    padding: 10px 16px;
    font-family: var(--font-head);
    font-weight: 500;
    font-size: 13.5px;
    color: var(--text2);
    border-radius: var(--radius-sm);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background var(--trans), color var(--trans);
  }
  .tab:hover {
    background: var(--bg2);
    color: var(--text);
  }
  .tab.active {
    color: var(--cyan-fg);
    background: var(--cyan-dim);
  }
  .tab .tab-icon {
    width: 16px;
    height: 16px;
    opacity: 0.9;
    flex-shrink: 0;
  }
  .tab .tab-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    background: var(--bg3);
    color: var(--text2);
    border-radius: 9px;
  }
  .tab.active .tab-badge {
    background: var(--cyan);
    color: #0a0b10;
  }

  /* ---------- Header actions ---------- */
  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .status-dot {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text2);
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    background: var(--bg2);
  }
  .status-dot::before {
    content: '';
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  @media (max-width: 720px) {
    .app-header-inner { padding: 10px 14px; gap: 12px; }
    .brand-name { display: none; }
    .tab { padding: 8px 10px; font-size: 12.5px; }
    .header-actions .status-dot span { display: none; }
  }
</style>
</head>
<body>
  <header class="app-header">
    <div class="app-header-inner">
      <div class="brand">
        <div class="brand-logo">C</div>
        <div class="brand-name">career-ops <span>/ control panel</span></div>
      </div>

      <nav class="tabs" role="tablist" aria-label="Main navigation">
        <button class="tab active" role="tab" data-tab="dashboard" aria-selected="true">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
          Dashboard
        </button>
        <button class="tab" role="tab" data-tab="scanner" aria-selected="false">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Scanner
        </button>
        <button class="tab" role="tab" data-tab="pipeline" aria-selected="false">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M4 12h16M4 17h10"/></svg>
          Pipeline
          <span class="tab-badge" id="pipeline-count">0</span>
        </button>
        <button class="tab" role="tab" data-tab="tracker" aria-selected="false">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Tracker
          <span class="tab-badge" id="tracker-count">0</span>
        </button>
        <button class="tab" role="tab" data-tab="reports" aria-selected="false">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>
          Reports
          <span class="tab-badge" id="reports-count">0</span>
        </button>
      </nav>

      <div class="header-actions">
        <div class="status-dot" title="Server connected"><span>live</span></div>
      </div>
    </div>
  </header>

  <main id="app-main">
    <!-- Step 3+ will add tab panels here -->
  </main>
</body>
</html>
