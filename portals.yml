  # -- AI-native platforms (Ashby) --
  - name: Ashby — AI Product Manager
    query: 'site:jobs.ashbyhq.com "Product Manager" OR "Senior Product Manager" OR "Lead Product Manager" OR "AI Product Manager" OR "Product Owner" OR "Senior Product Owner" OR "Lead Product Owner" remote -"Principal" -"Director" -"Head of" -"VP"'
    enabled: true

  - name: Ashby — Senior PM
    query: 'site:jobs.ashbyhq.com "Product Manager" OR "Senior Product Manager" OR "Lead PM" OR "Product Owner" OR "Senior Product Owner" remote -"Principal" -"Director" -"Head of" -"VP"'
