# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  # HOW THIS WORKS:
  # A role passes if its title contains at least 1 positive keyword AND zero negative keywords.
  # Because "Product Manager" is a substring match, it automatically catches:
  #   "CRM Product Manager", "Salesforce Product Owner", "B2B Senior Product Lead",
  #   "AI Product Manager", "Digital Product Operations Manager", etc.
  # Domain words (CRM, Salesforce, B2B, CCaaS, Martech, AI, etc.) act as adjectives —
  # they qualify the Product role, not replace it.
  #
  # SENIORITY INCLINATION (locked 2026-04-23):
  # MID-LEVEL first, then MID-SENIOR. Product Manager / Product Owner are first priority.
  # NOT Principal / Staff / Director / Head / VP / Associate / Junior.
  #
  # EXCLUDED COMPANIES (locked 2026-04-23): Google, Meta, Apple, Amazon, Netflix, Microsoft.
  # See config/profile.yml excluded_companies.

  positive:
    # -- Core Product role titles (mid-level priority) --
    - "Product Manager"       # catches: PM, Senior PM, AI PM, CRM PM, etc.
    - "Product Owner"         # catches: PO, Senior PO, AI PO, etc.
    - "Product Lead"
    - "Product Operations Manager"
    - "Senior Product Operations"
    - "Lead Product Operations"
    - "Product Strategist"
    - "Senior PM"
    - "Senior PO"
    - "Lead PM"
    - "Lead PO"
    - "Group PM"
    - "AI PM"
    - "PM II"
    - "PM III"
    # -- Adjacent roles (role diversity — added 2026-04-23) --
    - "AI Program Manager"
    - "AI Strategist"
    - "AI Solutions Manager"
    - "Solutions Lead"
    - "Transformation Manager"
    - "AI Transformation"
    - "Innovation Manager"
    - "Implementation Lead"
  negative:
    # -- Too junior --
    - "Junior"
    - "Intern"
    - "Associate Product"
    - "Graduate"
    - "Apprentice"
    - "Entry Level"
    # -- Too senior (locked: mid + mid-senior only, not strict senior) --
    - "Principal Product"
    - "Staff Product"
    - "Director of Product"
    - "Director of"
    - "VP of Product"
    - "VP Product"
    - "VP,"
    - "Vice President"
    - "Head of Product"
    - "Head of Growth"
    - "Chief Product"
    - "CPO"
    # -- Excluded companies (FAANG/MAANG — locked 2026-04-23) --
    - "at Google"
    - "at Meta"
    - "at Facebook"
    - "at Apple"
    - "at Amazon"
    - "at Netflix"
    - "at Microsoft"
    # -- Engineering / DS / Research (not PM/PO) --
    - "Software Engineer"
    - "Data Engineer"
    - "DevOps Engineer"
    - "ML Engineer"
    - "AI Engineer"
    - "Machine Learning Engineer"
    - "Solutions Engineer"
    - "Solutions Architect"
    - "Forward Deployed"
    - "Engineering Manager"
    - "Developer Advocate"
    - "DevRel"
    - "Developer Relations"
    - "Data Scientist"
    - "Research Scientist"
    - "Applied Scientist"
    - "Researcher"
    - "MLOps Engineer"
    # -- Sales & marketing execution (not product strategy) --
    - "Sales Manager"
    - "Sales Representative"
    - "Sales Agent"
    - "Field Sales"
    - "Account Executive"
    - "Account Manager"
    - "Customer Success"
    - "Salesforce Admin"
    - "Salesforce Developer"
    # -- Tech stack / language-specific --
    - ".NET"
    - "Java "
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
  seniority_boost:
    - "Senior"
    - "Lead"
    - "Group"
    - "AI"
    - "Technical"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

